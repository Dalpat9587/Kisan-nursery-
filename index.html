<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kisan Nursery — Premium Landscaping & Gardening</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --forest: #0a4020;
  --leaf: #1a7a3c;
  --mint: #2ecc71;
  --sage: #a8c5a0;
  --cream: #f7f4ef;
  --bark: #5c3d1e;
  --gold: #c9a84c;
  --white: #ffffff;
  --text: #1a1a1a;
  --text-light: #555;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--leaf); border-radius: 3px; }

/* ─── NAVBAR ─── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 6%;
  height: 75px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10, 64, 32, 0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 42px; height: 42px;
  background: var(--mint);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.nav-logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 700;
  color: white;
  line-height: 1;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--sage);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 400;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 8px;
}

nav ul li a {
  color: rgba(255,255,255,0.82);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 30px;
  transition: all 0.25s;
  letter-spacing: 0.3px;
}

nav ul li a:hover {
  background: rgba(255,255,255,0.12);
  color: white;
}

.nav-cta {
  background: var(--mint) !important;
  color: white !important;
  padding: 9px 22px !important;
}

.nav-cta:hover {
  background: #27ae60 !important;
  transform: translateY(-1px);
}

/* ─── HERO ─── */
.hero {
  height: 100vh;
  min-height: 700px;
  position: relative;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: url('https://images.unsplash.com/photo-1585320806297-9794b3e4aaae?w=1600') center/cover no-repeat;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(10,64,32,0.88) 0%,
    rgba(10,64,32,0.55) 50%,
    rgba(0,0,0,0.3) 100%
  );
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 8%;
  max-width: 780px;
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #b8f5c8;
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 28px;
  backdrop-filter: blur(8px);
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 7vw, 90px);
  font-weight: 700;
  color: white;
  line-height: 1.05;
  margin-bottom: 22px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.2);
}

.hero h1 em {
  font-style: italic;
  color: #8dffc7;
}

.hero p {
  font-size: 19px;
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  margin-bottom: 40px;
  font-weight: 300;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 36px;
  background: var(--mint);
  color: white;
  text-decoration: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.3s;
  border: 2px solid var(--mint);
}

.btn-primary:hover {
  background: transparent;
  border-color: white;
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 36px;
  background: transparent;
  color: white;
  text-decoration: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  border: 2px solid rgba(255,255,255,0.4);
  transition: all 0.3s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  border-color: white;
  transform: translateY(-3px);
}

.hero-stats {
  position: absolute;
  bottom: 50px;
  right: 8%;
  z-index: 2;
  display: flex;
  gap: 40px;
  animation: fadeUp 1.2s 0.3s ease both;
}

.stat-item {
  text-align: center;
  color: white;
}

.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  color: #8dffc7;
}

.stat-label {
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
}

.hero-scroll {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
}

/* ─── SECTION BASE ─── */
.section { padding: 100px 8%; }
.section-sm { padding: 60px 8%; }

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--leaf);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-tag::before {
  content: '';
  display: block;
  width: 24px;
  height: 2px;
  background: var(--mint);
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 4.5vw, 58px);
  font-weight: 700;
  color: var(--forest);
  line-height: 1.15;
  margin-bottom: 20px;
}

.section-title.light { color: white; }

.section-subtitle {
  font-size: 18px;
  color: var(--text-light);
  line-height: 1.7;
  max-width: 560px;
  font-weight: 300;
}

/* ─── TRUST BAR ─── */
.trust-bar {
  background: var(--forest);
  padding: 30px 8%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 60px;
  flex-wrap: wrap;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(255,255,255,0.75);
  font-size: 15px;
  font-weight: 500;
}

.trust-icon {
  font-size: 24px;
}

/* ─── ABOUT ─── */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.about-images {
  position: relative;
  height: 580px;
}

.about-img-main {
  position: absolute;
  top: 0; left: 0;
  width: 72%;
  height: 82%;
  object-fit: cover;
  border-radius: 24px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.15);
}

.about-img-secondary {
  position: absolute;
  bottom: 0; right: 0;
  width: 55%;
  height: 55%;
  object-fit: cover;
  border-radius: 20px;
  border: 6px solid var(--cream);
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

.about-badge-float {
  position: absolute;
  top: 55%;
  left: 58%;
  background: var(--forest);
  color: white;
  padding: 20px 25px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(10,64,32,0.35);
  z-index: 10;
}

.about-badge-float .num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--mint);
  line-height: 1;
}

.about-badge-float .lbl {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.about-content .section-subtitle {
  max-width: 100%;
  margin-bottom: 30px;
}

.about-features {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 36px;
}

.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 20px;
  background: white;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.06);
  transition: all 0.3s;
}

.feature-item:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.feature-icon {
  width: 44px;
  height: 44px;
  background: #e8f9f0;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.feature-text h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--forest);
  margin-bottom: 4px;
}

.feature-text p {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.5;
}

/* ─── SERVICES ─── */
.services-section {
  background: var(--forest);
  position: relative;
  overflow: hidden;
}

.services-section::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(46,204,113,0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.services-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 60px;
  flex-wrap: wrap;
  gap: 20px;
}

.services-header .section-tag { color: var(--sage); }

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.service-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 40px 36px;
  transition: all 0.4s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(46,204,113,0.1) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s;
}

.service-card:hover {
  border-color: rgba(46,204,113,0.4);
  transform: translateY(-8px);
  background: rgba(255,255,255,0.07);
}

.service-card:hover::before { opacity: 1; }

.service-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: var(--mint);
  letter-spacing: 3px;
  margin-bottom: 30px;
  opacity: 0.7;
}

.service-icon-wrap {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: rgba(46,204,113,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 24px;
  transition: all 0.3s;
}

.service-card:hover .service-icon-wrap {
  background: rgba(46,204,113,0.25);
  transform: scale(1.1);
}

.service-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 700;
  color: white;
  margin-bottom: 14px;
}

.service-card p {
  font-size: 14px;
  color: rgba(255,255,255,0.58);
  line-height: 1.7;
}

.service-card .arrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--mint);
  font-size: 13px;
  font-weight: 600;
  margin-top: 24px;
  opacity: 0;
  transition: all 0.3s;
}

.service-card:hover .arrow { opacity: 1; transform: translateX(4px); }

/* ─── GALLERY ─── */
.gallery-section {}

.gallery-header {
  text-align: center;
  margin-bottom: 60px;
}

.gallery-header .section-subtitle {
  margin: 0 auto;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: 280px 280px;
  gap: 16px;
}

.gallery-item {
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}

.gallery-item:nth-child(1) {
  grid-column: 1 / 3;
  grid-row: 1 / 2;
}

.gallery-item:nth-child(4) {
  grid-column: 3 / 5;
  grid-row: 2 / 3;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.gallery-item:hover img { transform: scale(1.08); }

.gallery-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,64,32,0.8) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
  display: flex;
  align-items: flex-end;
  padding: 24px;
}

.gallery-item:hover .gallery-overlay { opacity: 1; }

.gallery-caption {
  color: white;
  font-size: 16px;
  font-weight: 600;
}

/* ─── PROCESS ─── */
.process-section {
  background: white;
}

.process-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  margin-top: 60px;
  position: relative;
}

.process-grid::before {
  content: '';
  position: absolute;
  top: 40px;
  left: 12.5%;
  right: 12.5%;
  height: 2px;
  background: linear-gradient(to right, var(--mint), var(--sage));
}

.process-step {
  text-align: center;
  padding: 20px 30px;
  position: relative;
}

.step-num {
  width: 80px;
  height: 80px;
  background: var(--forest);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
  margin: 0 auto 28px;
  border: 4px solid var(--cream);
  position: relative;
  z-index: 1;
  box-shadow: 0 8px 20px rgba(10,64,32,0.2);
  transition: all 0.3s;
}

.process-step:hover .step-num {
  background: var(--mint);
  transform: scale(1.1);
}

.process-step h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--forest);
  margin-bottom: 12px;
}

.process-step p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ─── WHY US ─── */
.whyus-section {
  background: var(--cream);
}

.whyus-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.whyus-image {
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  height: 550px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.12);
}

.whyus-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.whyus-image-badge {
  position: absolute;
  bottom: 30px;
  left: 30px;
  right: 30px;
  background: rgba(10,64,32,0.9);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 24px 28px;
  display: flex;
  gap: 24px;
  align-items: center;
}

.badge-stat {
  flex: 1;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.15);
}

.badge-stat:last-child { border-right: none; }

.badge-stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--mint);
}

.badge-stat-lbl {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.reasons-list {
  list-style: none;
  margin-top: 36px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.reason-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 24px;
  background: white;
  border-radius: 20px;
  transition: all 0.3s;
  border: 1px solid transparent;
}

.reason-item:hover {
  border-color: var(--mint);
  transform: translateX(8px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.07);
}

.reason-icon {
  width: 52px;
  height: 52px;
  background: #e8f9f0;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.reason-item h4 {
  font-size: 16px;
  font-weight: 600;
  color: var(--forest);
  margin-bottom: 6px;
}

.reason-item p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─── PLANTS SHOWCASE ─── */
.plants-section {
  background: white;
}

.plants-header {
  text-align: center;
  margin-bottom: 60px;
}

.plants-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

.plant-card {
  border-radius: 24px;
  overflow: hidden;
  background: var(--cream);
  transition: all 0.4s;
  border: 1px solid rgba(0,0,0,0.06);
}

.plant-card:hover {
  transform: translateY(-12px);
  box-shadow: 0 30px 60px rgba(0,0,0,0.12);
}

.plant-img {
  height: 220px;
  overflow: hidden;
}

.plant-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s;
}

.plant-card:hover .plant-img img { transform: scale(1.1); }

.plant-info {
  padding: 22px;
}

.plant-tag {
  display: inline-block;
  background: #e8f9f0;
  color: var(--leaf);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 12px;
}

.plant-info h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--forest);
  margin-bottom: 8px;
}

.plant-info p {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─── TESTIMONIALS ─── */
.testimonials-section {
  background: var(--forest);
  position: relative;
  overflow: hidden;
}

.testimonials-section::after {
  content: '"';
  position: absolute;
  top: -40px;
  right: 8%;
  font-family: 'Cormorant Garamond', serif;
  font-size: 400px;
  color: rgba(255,255,255,0.03);
  line-height: 1;
  pointer-events: none;
}

.testimonials-header {
  text-align: center;
  margin-bottom: 60px;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.testimonial-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 36px;
  transition: all 0.3s;
}

.testimonial-card:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-6px);
}

.t-stars { font-size: 18px; margin-bottom: 20px; }

.t-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: rgba(255,255,255,0.88);
  line-height: 1.65;
  margin-bottom: 28px;
  font-style: italic;
}

.t-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.t-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(46,204,113,0.4);
}

.t-name {
  font-size: 15px;
  font-weight: 600;
  color: white;
}
